version: "3.9"

# ─────────────────────────────────────────────────────────────
# Local development / self-hosted VPS usage.
# For Railway/Render: skip this file and use their dashboard.
# ─────────────────────────────────────────────────────────────

services:
  notion-mcp:
    build: .
    container_name: notion-mcp-server
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Secrets — set these in your shell or a .env file
      - NOTION_API_KEY=${NOTION_API_KEY}
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      - NOTION_VERSION=${NOTION_VERSION:-2022-06-28}
    env_file:
      - .env          # Only used locally; never commit .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
